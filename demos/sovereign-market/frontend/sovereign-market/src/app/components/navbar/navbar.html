<nav class="navbar">
  <div class="container nav-inner">
    <a class="nav-brand" routerLink="/">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">SovereignMarket</span>
    </a>

    <div class="nav-search">
      <input
        type="text"
        placeholder="Search 500+ products..."
        [(ngModel)]="searchQuery"
        (keyup.enter)="doSearch()"
      />
      <button class="search-btn" (click)="doSearch()">🔍</button>
    </div>

    <div class="nav-actions">
      <a routerLink="/catalog" class="nav-link">Catalog</a>
      @if (user()) {
        <a routerLink="/orders" class="nav-link">Orders</a>
        <button class="btn btn-ghost btn-sm" (click)="logout()">Sign out</button>
      } @else {
        <button class="btn btn-secondary btn-sm" (click)="showLogin = true">Sign in</button>
      }
      <a routerLink="/cart" class="cart-btn">
        🛒
        @if ((cart()?.item_count ?? 0) > 0) {
          <span class="cart-badge">{{ cart()?.item_count }}</span>
        }
      </a>
    </div>
  </div>
</nav>
