# SSoA LEVEL 3: MANIFEST SHARD
# FILE: agent/Cargo.toml
# MISSION: Cargo workspace for the Skr8tr AI agent layer.
#          ra-rag is vendored from RusticAgentic — do not modify it.
#          Only skr8tr-agent is sovereign Skr8tr territory.

[workspace]
resolver = "2"
members  = [
    "crates/ra-rag",
    "crates/skr8tr-agent",
]

[workspace.package]
version  = "0.1.0"
edition  = "2021"
authors  = ["NixOSDude <scott.bakerphx@gmail.com>"]
license  = "Apache-2.0"

[workspace.dependencies]
# --- Async runtime ---
tokio             = { version = "1",              features = ["full"] }

# --- Serialization ---
serde             = { version = "1",              features = ["derive"] }
serde_json        = "1"

# --- HTTP client ---
reqwest           = { version = "0.12",           features = ["json", "stream"] }

# --- Error handling ---
anyhow            = "1"
thiserror         = "2"

# --- Logging ---
tracing           = "0.1"
tracing-subscriber = { version = "0.3",           features = ["env-filter", "fmt"] }

# --- CLI ---
clap              = { version = "4",              features = ["derive", "env"] }

# --- ML / vector search ---
ort               = { version = "2.0.0-rc.12",   features = ["cuda", "ndarray"] }
ndarray           = "0.17"
usearch           = "2"
rig-core          = "0.34"
tokenizers        = { version = "0.21",           default-features = false, features = ["fancy-regex"] }

# --- Utilities ---
walkdir           = "2"
uuid              = { version = "1",              features = ["v4", "serde"] }
chrono            = { version = "0.4",            features = ["serde"] }
bytes             = "1"
futures           = "0.3"
async-trait       = "0.1"
